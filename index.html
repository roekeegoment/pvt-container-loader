function calcUniform(C, bl, bw, bh) {
  const nl = Math.floor(C.l / bl),
    nw = Math.floor(C.w / bw),
    nh = Math.floor(C.h / bh);
  const pos = [];
  for (let li = 0; li < nl; li++) for (let wi = 0; wi < nw; wi++) for (let hi = 0; hi < nh; hi++) pos.push({
    x: li * bl,
    y: hi * bh,
    z: wi * bw,
    sx: bl,
    sy: bh,
    sz: bw
  });
  return {
    pos,
    total: nl * nw * nh,
    perLayer: nl * nw,
    layers: nh,
    wUsed: nw * bw
  };
}
function calcMixed(C, groups, bh) {
  const nh = Math.floor(C.h / bh),
    pos = [];
  let z = 0,
    perLayer = 0;
  for (const {
    n,
    bw,
    bl
  } of groups) {
    const nl = Math.floor(C.l / bl);
    for (let r = 0; r < n && z + bw <= C.w + 8; r++) {
      perLayer += nl;
      for (let li = 0; li < nl; li++) for (let hi = 0; hi < nh; hi++) pos.push({
        x: li * bl,
        y: hi * bh,
        z,
        sx: bl,
        sy: bh,
        sz: bw
      });
      z += bw;
    }
  }
  return {
    pos,
    total: pos.length,
    perLayer,
    layers: nh,
    wUsed: z
  };
}

function calcPalletLoad(C, box, pal) {
  const {
      L: bl,
      W: bw,
      H: bh
    } = box,
    {
      l: pl,
      w: pw,
      h: ph
    } = pal;
  const availH = C.h - ph - 50,
    bLayH = Math.max(1, Math.floor(availH / bh));
  let best = null;
  for (const [bBL, bBW] of [[bl, bw], [bw, bl]]) {
    for (const [pL, pW] of [[pl, pw], [pw, pl]]) {
      const bOnL = Math.floor(pL / bBL),
        bOnW = Math.floor(pW / bBW);
      const bPerPal = bOnL * bOnW * bLayH;
      const pCL = Math.floor(C.l / pL),
        pCW = Math.floor(C.w / pW);
      const totPal = pCL * pCW,
        totBox = totPal * bPerPal;
      if (!best || totBox > best.totalBoxes) {
        const pos = [],
          palPos = [];
        for (let pi = 0; pi < pCL; pi++) for (let pj = 0; pj < pCW; pj++) {
          const px = pi * pL,
            pz = pj * pW;
          palPos.push({
            x: px,
            y: 0,
            z: pz,
            sx: pL,
            sy: ph,
            sz: pW
          });
          for (let bi = 0; bi < bOnL; bi++) for (let bj = 0; bj < bOnW; bj++) for (let bk = 0; bk < bLayH; bk++) pos.push({
            x: px + bi * bBL,
            y: ph + bk * bh,
            z: pz + bj * bBW,
            sx: bBL,
            sy: bh,
            sz: bBW
          });
        }
        best = {
          totalBoxes: totBox,
          totalPallets: totPal,
          boxesPerPallet: bPerPal,
          boxesPerLayer: bOnL * bOnW,
          boxLayersH: bLayH,
          pos,
          palPos,
          usedL: pCL * pL,
          usedW: pCW * pW,
          palletsL: pCL,
          palletsW: pCW
        };
      }
    }
  }
  return best || {
    totalBoxes: 0,
    totalPallets: 0,
    boxesPerPallet: 0,
    boxesPerLayer: 0,
    boxLayersH: 0,
    pos: [],
    palPos: [],
    usedL: 0,
    usedW: 0,
    palletsL: 0,
    palletsW: 0
  };
}
function calcMixLoad(C, items) {
  const results = [];
  let curX = 0;
  for (const item of items) {
    const {
        L,
        W,
        H,
        wt
      } = item.box,
      subLen = item.allocLen || 0;
    if (subLen <= 0) {
      results.push({
        total: 0,
        pos: [],
        perLayer: 0,
        layers: 0,
        wt,
        allocLen: 0
      });
      continue;
    }
    const orients = [{
      bl: L,
      bw: W,
      bh: H
    }, {
      bl: W,
      bw: L,
      bh: H
    }, {
      bl: L,
      bw: H,
      bh: W
    }, {
      bl: H,
      bw: L,
      bh: W
    }, {
      bl: W,
      bw: H,
      bh: L
    }, {
      bl: H,
      bw: W,
      bh: L
    }];
    let best = {
      total: 0,
      pos: [],
      perLayer: 0,
      layers: 0,
      bl: L,
      bw: W,
      bh: H
    };
    for (const o of orients) {
      const nl = Math.floor(subLen / o.bl),
        nw = Math.floor(C.w / o.bw),
        nh = Math.floor(C.h / o.bh);
      const total = nl * nw * nh;
      if (total > best.total) {
        const pos = [];
        for (let li = 0; li < nl; li++) for (let wi = 0; wi < nw; wi++) for (let hi = 0; hi < nh; hi++) pos.push({
          x: curX + li * o.bl,
          y: hi * o.bh,
          z: wi * o.bw,
          sx: o.bl,
          sy: o.bh,
          sz: o.bw
        });
        best = {
          total,
          pos,
          perLayer: nl * nw,
          layers: nh,
          ...o
        };
      }
    }
    results.push({
      ...best,
      wt,
      allocLen: subLen
    });
    curX += subLen;
  }
  return results;
}

/* ── PDF HELPERS ─────────────────────────────────────────────────────────── */
function getGridData(result) {
  if (!result || !result.pos || !result.pos.length) return null;
  const pos = result.pos;
  const zSet = new Set(pos.map(p => p.z));
  const xSet = new Set(pos.map(p => p.x));
  const ySet = new Set(pos.map(p => p.y));
  const zVals = [...zSet].sort((a, b) => a - b);
  const xVals = [...xSet].sort((a, b) => a - b);
  const yVals = [...ySet].sort((a, b) => a - b);
  const fc = zVals.length,
    fr = yVals.length,
    sc = xVals.length,
    sr = yVals.length;
  // Front view: at x=xVals[0]
  const frontX = xVals[0];
  const fSet = new Set(pos.filter(p => p.x === frontX).map(p => p.z + ',' + p.y));
  const fg = [];
  for (let ri = fr - 1; ri >= 0; ri--) {
    const row = [];
    for (let ci = 0; ci < fc; ci++) row.push(fSet.has(zVals[ci] + ',' + yVals[ri]));
    fg.push(row);
  }
  // Side view: at z=zVals[0]
  const sideZ = zVals[0];
  const sSet = new Set(pos.filter(p => p.z === sideZ).map(p => p.x + ',' + p.y));
  const sg = [];
  for (let ri = sr - 1; ri >= 0; ri--) {
    const row = [];
    for (let ci = 0; ci < sc; ci++) row.push(sSet.has(xVals[ci] + ',' + yVals[ri]));
    sg.push(row);
  }
  return {
    fc,
    fr,
    sc,
    sr,
    fg,
    sg
  };
}
function drawGrid(canvas, grid, cols, rows, fillColor) {
  if (!canvas || !grid || !cols || !rows) return;
  const ctx = canvas.getContext('2d');
  const LBL = 16,
    w = canvas.width,
    h = canvas.height;
  const cellW = (w - LBL) / cols,
    cellH = (h - LBL) / rows;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);
  ctx.font = '7px Arial';
  ctx.fillStyle = '#444';
  for (let ri = 0; ri < rows; ri++) {
    ctx.textAlign = 'right';
    ctx.fillText(rows - ri, LBL - 2, LBL + ri * cellH + cellH * 0.65);
    for (let ci = 0; ci < cols; ci++) {
      const x = LBL + ci * cellW,
        y = LBL + ri * cellH;
      ctx.fillStyle = grid[ri] && grid[ri][ci] ? fillColor : '#fff';
      ctx.fillRect(x + 0.5, y + 0.5, cellW - 1, cellH - 1);
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, cellW, cellH);
    }
  }
  ctx.fillStyle = '#444';
  ctx.textAlign = 'center';
  for (let ci = 0; ci < cols; ci++) ctx.fillText(ci + 1, LBL + (ci + 0.5) * cellW, LBL + rows * cellH + 10);
}
